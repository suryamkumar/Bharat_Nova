name: bharat_nova
description: BharatNova - Your News, Your Bharat.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  dio: ^5.8.0
  get_it: ^7.7.0
  go_router: ^14.2.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/